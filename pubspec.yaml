name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Video Player
  media_kit: ^1.2.6 # Primary package.
  media_kit_video: ^2.0.1 # For video rendering.
  media_kit_libs_video: ^1.0.7 # Native video dependencies.
  
  # Base de Datos
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  
  #Rutas del Suistema
  path_provider: ^2.1.0
  path: ^1.8.0
  # Image Picker
  image_picker: ^1.2.1  
  # State Management
  get: ^4.6.5

  #Inyección de dependencias
  get_it: ^7.6.0

  # Utilidades y Helpers
  uuid: ^4.5.3
  crypto: ^3.0.3
  equatable: ^2.0.0
  dartz: ^0.10.0
  intl: ^0.19.0
  http: ^1.2.2
  pdf: ^3.11.1
  printing: ^5.13.4
  image: ^4.8.0
  share_plus: ^12.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

  # Testing
  mockito: ^5.4.0

  # Generadores de código
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true

  assets:
    - assets/images/ico.png
    - assets/images/novapay.webp
    - assets/videos/novapay.mp4

flutter_launcher_icons:
  android: true
  windows:
    generate: true
    image_path: assets/images/ico.png
    icon_size: 48
  image_path: assets/images/ico.png


